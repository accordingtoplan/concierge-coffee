<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concierge Coffee</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.02em;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 32px;
    height: 48px;
  }

  .logo-text {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .nav-r {
    display: flex;
    gap: 32px;
    font-size: 11px;
    color: #111;
  }

  .nav-r a { transition: color 0.15s; cursor: pointer; }
  .nav-r a:hover { color: #999; }

  /* ── HERO ── */
  .hero { padding: 24px 32px 80px; }

  .hero-img {
    width: 100%;
    aspect-ratio: 16/7;
    background: #f2f2f2;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .hero-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .hero-title {
    font-size: clamp(48px, 7vw, 96px);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 0.92;
  }

  .hero-sub {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 4px;
  }

  .hero-sub span { display: block; font-size: 11px; color: #999; }
  .hero-sub a { font-size: 11px; color: #111; cursor: pointer; }

  /* ── SHOP ── */
  .shop { padding: 0 32px 80px; }

  .shop-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 48px;
    margin-bottom: 2px;
  }

  .shop-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
  }

  .card { cursor: pointer; }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    background: #f7f7f7;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: transform 0.5s ease;
  }

  .card:hover .card-img img { transform: scale(1.04); }

  .card-info {
    padding: 10px 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .card-name { font-size: 11px; font-weight: 400; }
  .card-sub { font-size: 10px; color: #bbb; margin-top: 3px; }
  .card-price { font-size: 11px; color: #111; }

  /* ── CART DRAWER ── */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 200;
  }

  .cart-overlay.open { display: block; }

  .cart-drawer {
    position: fixed;
    top: 0;
    right: -400px;
    width: 360px;
    height: 100vh;
    background: #fff;
    z-index: 201;
    display: flex;
    flex-direction: column;
    transition: right 0.3s ease;
    padding: 32px 24px;
  }

  .cart-drawer.open { right: 0; }

  .cart-drawer-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .cart-drawer-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .cart-close {
    font-size: 18px;
    cursor: pointer;
    color: #bbb;
    background: none;
    border: none;
    line-height: 1;
  }

  .cart-close:hover { color: #111; }

  .cart-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

  .cart-empty { color: #bbb; font-size: 11px; padding-top: 8px; }

  .ci {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 14px;
    align-items: start;
  }

  .ci-img { aspect-ratio: 1; background: #f2f2f2; overflow: hidden; }
  .ci-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ci-name { font-size: 11px; }
  .ci-sub { font-size: 10px; color: #bbb; margin-top: 4px; }
  .ci-price { font-size: 11px; }

  .cart-footer { border-top: 1px solid #f0f0f0; padding-top: 24px; margin-top: 24px; display: flex; flex-direction: column; gap: 16px; }

  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }

  .cart-total-lbl { color: #bbb; }

  .atc {
    background: #111;
    color: #fff;
    border: none;
    padding: 14px 16px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
    text-align: center;
  }

  .atc:hover { opacity: 0.75; }
  .atc:disabled { opacity: 0.4; cursor: default; }

  /* ── FOOTER ── */
  footer {
    padding: 48px 32px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 80px;
    border-top: 1px solid #f0f0f0;
  }

  .ft-logo {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .ft-addr { font-size: 11px; line-height: 1.9; color: #bbb; }

  .ft-h {
    font-size: 10px;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .ft-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }

  .ft-links a { font-size: 11px; color: #bbb; transition: color 0.15s; }
  .ft-links a:hover { color: #111; }

  .ft-copy {
    grid-column: 1 / -1;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #ccc;
  }

  /* loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <span class="logo-text">Concierge.</span>
  </div>
  <div class="nav-r">
    <a onclick="scrollToShop()">Shop</a>
    <a href="#">Visit</a>
    <a onclick="openCart()" id="bag-link">Bag (0)</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-img">
    <img src="images/hero.jpeg" alt="Concierge Coffee" />
  </div>
  <div class="hero-meta">
    <div class="hero-title">Single<br>origin.</div>
    <div class="hero-sub">
      <span>Arts District, LA</span>
      <span>821 Traction Ave</span>
      <a onclick="scrollToShop()">Shop →</a>
    </div>
  </div>
</section>

<!-- SHOP -->
<section class="shop" id="shop">
  <div class="shop-head">
    <span class="shop-title">Coffee</span>
  </div>
  <div class="grid" id="product-grid">
    <!-- skeleton cards -->
    <div class="card"><div class="card-img skeleton"></div><div class="card-info"><div><div class="card-name skeleton" style="width:80px;height:11px;margin-bottom:4px"></div><div class="card-sub skeleton" style="width:120px;height:10px"></div></div></div></div>
    <div class="card"><div class="card-img skeleton"></div><div class="card-info"><div><div class="card-name skeleton" style="width:80px;height:11px;margin-bottom:4px"></div><div class="card-sub skeleton" style="width:120px;height:10px"></div></div></div></div>
    <div class="card"><div class="card-img skeleton"></div><div class="card-info"><div><div class="card-name skeleton" style="width:80px;height:11px;margin-bottom:4px"></div><div class="card-sub skeleton" style="width:120px;height:10px"></div></div></div></div>
    <div class="card"><div class="card-img skeleton"></div><div class="card-info"><div><div class="card-name skeleton" style="width:80px;height:11px;margin-bottom:4px"></div><div class="card-sub skeleton" style="width:120px;height:10px"></div></div></div></div>
  </div>
</section>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-head">
    <span class="cart-drawer-title">Bag</span>
    <button class="cart-close" onclick="closeCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">Your bag is empty.</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-lbl">Total</span>
      <span id="cart-total">—</span>
    </div>
    <button class="atc" id="checkout-btn" onclick="goToCheckout()" disabled>Checkout</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <div class="ft-logo">Concierge Coffee</div>
    <div class="ft-addr">
      821 Traction Ave<br>
      Los Angeles, CA 90013
    </div>
  </div>
  <div>
    <div class="ft-h">Shop</div>
    <ul class="ft-links" id="footer-links">
      <li><a href="#">Coffee</a></li>
    </ul>
  </div>
  <div>
    <div class="ft-h">Info</div>
    <ul class="ft-links">
      <li><a href="#">Visit</a></li>
      <li><a href="#">Wholesale</a></li>
      <li><a href="#">Instagram</a></li>
    </ul>
  </div>
  <div class="ft-copy">
    <span>© 2026 Concierge Coffee LLC</span>
    <span>conciergecoffee.com</span>
  </div>
</footer>

<script type="module">
  const SHOPIFY_DOMAIN = 'concierge-coffee-2245.myshopify.com';
  const STOREFRONT_TOKEN = '72c7d161eb6090308178da3ee5c88887';
  const API_URL = `https://${SHOPIFY_DOMAIN}/api/2026-04/graphql.json`;

  let cart = null; // Shopify cart object
  let products = [];

  async function shopifyFetch(query, variables = {}) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN,
      },
      body: JSON.stringify({ query, variables }),
    });
    const json = await res.json();
    if (json.errors) console.error('Shopify:', json.errors);
    return json.data;
  }

  async function loadProducts() {
    const data = await shopifyFetch(`{
      products(first: 20) {
        edges {
          node {
            id title handle description tags
            priceRange { minVariantPrice { amount currencyCode } }
            images(first: 1) { edges { node { url altText } } }
            variants(first: 1) { edges { node { id title availableForSale } } }
          }
        }
      }
    }`);

    products = data?.products?.edges?.map(e => e.node) ?? [];
    renderProducts();
    renderFooterLinks();
  }

  function formatPrice(amount, currency = 'USD') {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(amount);
  }

  function renderProducts() {
    const grid = document.getElementById('product-grid');
    if (!products.length) {
      grid.innerHTML = '<p style="color:#bbb;font-size:11px;grid-column:1/-1;padding:24px 0">No products found. Add products in your Shopify admin.</p>';
      return;
    }

    grid.innerHTML = products.map(p => {
      const img = p.images.edges[0]?.node;
      const price = formatPrice(p.priceRange.minVariantPrice.amount, p.priceRange.minVariantPrice.currencyCode);
      const variantId = p.variants.edges[0]?.node?.id;
      const available = p.variants.edges[0]?.node?.availableForSale;

      return `
        <div class="card" onclick="addToCartHandler('${variantId}', '${p.title}', '${p.priceRange.minVariantPrice.amount}', '${img?.url ?? ''}')">
          <div class="card-img">
            ${img ? `<img src="${img.url}" alt="${img.altText ?? p.title}" />` : `<div class="skeleton" style="width:100%;height:100%"></div>`}
          </div>
          <div class="card-info">
            <div>
              <div class="card-name">${p.title}</div>
              <div class="card-sub">${p.description ? p.description.substring(0, 40) : ''}</div>
            </div>
            <div class="card-price">${price}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderFooterLinks() {
    const ul = document.getElementById('footer-links');
    ul.innerHTML = products.map(p => `<li><a href="#">${p.title}</a></li>`).join('');
  }

  async function addToCartHandler(variantId, title, price, imgUrl) {
    if (!variantId) return;

    updateBagLink('...');

    if (!cart) {
      const data = await shopifyFetch(`
        mutation cartCreate($input: CartInput!) {
          cartCreate(input: $input) {
            cart {
              id checkoutUrl
              cost { totalAmount { amount currencyCode } }
              lines(first: 20) { edges { node { id quantity merchandise { ... on ProductVariant { id title product { title } price { amount } image { url } } } } } }
            }
          }
        }
      `, { input: { lines: [{ merchandiseId: variantId, quantity: 1 }] } });
      cart = data?.cartCreate?.cart;
    } else {
      const data = await shopifyFetch(`
        mutation cartLinesAdd($cartId: ID!, $lines: [CartLineInput!]!) {
          cartLinesAdd(cartId: $cartId, lines: $lines) {
            cart {
              id checkoutUrl
              cost { totalAmount { amount currencyCode } }
              lines(first: 20) { edges { node { id quantity merchandise { ... on ProductVariant { id title product { title } price { amount } image { url } } } } } }
            }
          }
        }
      `, { cartId: cart.id, lines: [{ merchandiseId: variantId, quantity: 1 }] });
      cart = data?.cartLinesAdd?.cart;
    }

    renderCart();
    openCart();
  }

  function renderCart() {
    if (!cart) return;
    const lines = cart.lines.edges.map(e => e.node);
    const total = cart.cost.totalAmount;
    const count = lines.reduce((s, l) => s + l.quantity, 0);

    updateBagLink(count);

    const itemsEl = document.getElementById('cart-items');
    if (!lines.length) {
      itemsEl.innerHTML = '<div class="cart-empty">Your bag is empty.</div>';
    } else {
      itemsEl.innerHTML = lines.map(line => {
        const m = line.merchandise;
        const img = m.image?.url;
        return `
          <div class="ci">
            <div class="ci-img">${img ? `<img src="${img}" alt="${m.product.title}">` : ''}</div>
            <div>
              <div class="ci-name">${m.product.title}</div>
              <div class="ci-sub">${m.title !== 'Default Title' ? m.title : ''} × ${line.quantity}</div>
            </div>
            <div class="ci-price">${formatPrice(m.price.amount)}</div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('cart-total').textContent = formatPrice(total.amount, total.currencyCode);
    document.getElementById('checkout-btn').disabled = !lines.length;
  }

  function updateBagLink(count) {
    document.getElementById('bag-link').textContent = `Bag (${count})`;
  }

  window.openCart = () => {
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-drawer').classList.add('open');
  };

  window.closeCart = () => {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-drawer').classList.remove('open');
  };

  window.goToCheckout = () => {
    if (cart?.checkoutUrl) window.location.href = cart.checkoutUrl;
  };

  window.scrollToShop = () => {
    document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
  };

  window.addToCartHandler = addToCartHandler;

  // Init
  loadProducts();
</script>
</body>
</html>
